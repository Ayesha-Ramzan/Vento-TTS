// ANIMATED BACKGROUND WITH LOGO IMAGE
// ============================================
const AnimatedWaveBackground = () => {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animationId;
    let time = 0;

    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    const drawWaveLine = (yBase, amplitude, frequency, speed, color, lineWidth, phaseOffset) => {
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      for (let x = 0; x <= canvas.width; x += 2) {
        const y = yBase + 
          Math.sin((x * frequency) + time * speed + phaseOffset) * amplitude +
          Math.sin((x * frequency * 2.1) + time * speed * 1.3 + phaseOffset) * (amplitude * 0.3) +
          Math.sin((x * frequency * 0.5) + time * speed * 0.7 + phaseOffset) * (amplitude * 0.5);

        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    };

    const drawMirroredWave = (yBase, amplitude, frequency, speed, color, lineWidth, phaseOffset) => {
      drawWaveLine(yBase - amplitude * 0.3, amplitude, frequency, speed, color, lineWidth, phaseOffset);
      drawWaveLine(yBase + amplitude * 0.3, amplitude, frequency, -speed, color, lineWidth, phaseOffset + Math.PI);
    };

    const animate = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      time += 0.004;

      const centerY = canvas.height * 0.55;

      const glow1 = ctx.createRadialGradient(canvas.width * 0.3, centerY, 0, canvas.width * 0.3, centerY, 300);
      glow1.addColorStop(0, 'rgba(184, 169, 201, 0.08)');
      glow1.addColorStop(1, 'rgba(184, 169, 201, 0)');
      ctx.fillStyle = glow1;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const glow2 = ctx.createRadialGradient(canvas.width * 0.7, centerY, 0, canvas.width * 0.7, centerY, 250);
      glow2.addColorStop(0, 'rgba(91, 138, 114, 0.06)');
      glow2.addColorStop(1, 'rgba(91, 138, 114, 0)');
      ctx.fillStyle = glow2;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const glow3 = ctx.createRadialGradient(canvas.width * 0.5, centerY + 50, 0, canvas.width * 0.5, centerY + 50, 200);
      glow3.addColorStop(0, 'rgba(232, 168, 124, 0.05)');
      glow3.addColorStop(1, 'rgba(232, 168, 124, 0)');
      ctx.fillStyle = glow3;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawMirroredWave(centerY, 45, 0.003, 0.5, 'rgba(184, 169, 201, 0.22)', 1.2, 0);
      drawMirroredWave(centerY, 38, 0.004, 0.4, 'rgba(91, 138, 114, 0.16)', 1, Math.PI / 3);
      drawMirroredWave(centerY, 52, 0.0025, 0.6, 'rgba(212, 201, 224, 0.13)', 0.8, Math.PI / 1.5);
      drawMirroredWave(centerY, 30, 0.005, 0.3, 'rgba(232, 168, 124, 0.10)', 0.7, Math.PI / 2);
      drawMirroredWave(centerY, 55, 0.006, 0.7, 'rgba(184, 169, 201, 0.07)', 0.5, Math.PI / 4);
      drawMirroredWave(centerY, 40, 0.007, 0.5, 'rgba(91, 138, 114, 0.05)', 0.4, Math.PI / 6);

      const centerX = canvas.width * 0.65;
      const circleGlow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 80);
      circleGlow.addColorStop(0, 'rgba(184, 169, 201, 0.12)');
      circleGlow.addColorStop(0.5, 'rgba(184, 169, 201, 0.04)');
      circleGlow.addColorStop(1, 'rgba(184, 169, 201, 0)');
      ctx.fillStyle = circleGlow;
      ctx.beginPath();
      ctx.arc(centerX, centerY, 80, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(184, 169, 201, 0.10)';
      ctx.lineWidth = 1;
      ctx.arc(centerX, centerY, 45, 0, Math.PI * 2);
      ctx.stroke();

      animationId = requestAnimationFrame(animate);
    };

    animate();
    return () => { cancelAnimationFrame(animationId); window.removeEventListener('resize', resize); };
  }, []);

  return (
    <div className="fixed top-0 left-0 w-full h-full pointer-events-none z-0 overflow-hidden" style={{ background: 'linear-gradient(135deg, #F5F1EB 0%, #E8E2D9 40%, #D4C9E0 100%)' }}>
      <canvas ref={canvasRef} className="absolute top-0 left-0 w-full h-full" />
    </div>
  );
};

// ============================================
// SEARCHABLE DROPDOWN
// ============================================
const SearchableDropdown = ({ options, value, onChange, placeholder, label, icon: Icon }) => {
  const [isOpen, setIsOpen] = useState(false);
  const [search, setSearch] = useState('');
  const dropdownRef = useRef(null);
  const filtered = options.filter(o => o.name.toLowerCase().includes(search.toLowerCase()) || (o.code && o.code.toLowerCase().includes(search.toLowerCase())));
  const selected = options.find(o => o.code === value || o.id === value);
  useEffect(() => {
    const handleClick = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsOpen(false); };
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);
  return (
    <div ref={dropdownRef} className="relative">
      {label && <label className="block text-[13px] font-semibold text-charcoal mb-1.5 tracking-wide">{label}</label>}
      <button type="button" onClick={() => setIsOpen(!isOpen)} className={`w-full px-4 py-3 bg-warmWhite border-2 rounded-xl flex items-center gap-2.5 cursor-pointer text-sm text-charcoal transition-all text-left ${isOpen ? 'border-teal' : 'border-sandDark hover:border-lavender'}`}>
        {Icon && <Icon s={18} c="text-teal flex-shrink-0" />}
        <span className="flex-1 truncate">{selected ? `${selected.flag || ''} ${selected.name}` : placeholder}</span>
        <Icons.ChevronRight s={16} c={`text-charcoalLight transition-transform flex-shrink-0 ${isOpen ? 'rotate-90' : ''}`} />
      </button>
      {isOpen && (
        <div className="absolute top-[calc(100%+4px)] left-0 right-0 bg-warmWhite border-2 border-sandDark rounded-xl shadow-xl z-[100] max-h-[300px] overflow-hidden">
          <div className="p-2.5 border-b border-sandDark">
            <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search..." className="w-full px-3 py-2 border border-sandDark rounded-lg text-sm outline-none focus:border-teal" autoFocus />
          </div>
          <div className="max-h-[220px] overflow-y-auto">
            {filtered.map((option) => (
              <button key={option.code || option.id} type="button" onMouseDown={(e) => { e.preventDefault(); onChange(option.code || option.id); setIsOpen(false); setSearch(''); }} className={`w-full px-3.5 py-2.5 text-left text-sm flex items-center gap-2 transition-colors ${(option.code === value || option.id === value) ? 'bg-sand' : 'hover:bg-sand'}`}>
                <span>{option.flag || ''}</span>
                <span>{option.name}</span>
                {(option.code === value || option.id === value) && <Icons.Check s={16} c="text-teal ml-auto" />}
              </button>
            ))}
            {filtered.length === 0 && <div className="p-4 text-center text-charcoalLight text-sm">No results found</div>}
          </div>
        </div>
      )}
    </div>
  );
};

// ============================================
// AUDIO PLAYER (with Web Speech API TTS)
// ============================================
const AudioPlayer = ({ audioUrl, text, language, onEnded, compact }) => {
  const [isPlaying, setIsPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [currentTime, setCurrentTime] = useState(0);
  const audioRef = useRef(null);
  const progressRef = useRef(null);

  // Web Speech API synthesis
  const speakText = () => {
    if (!text || !window.speechSynthesis) return;

    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    const langMap = { en: 'en-US', ur: 'ur-PK', ar: 'ar-SA', hi: 'hi-IN', es: 'es-ES', fr: 'fr-FR', de: 'de-DE', zh: 'zh-CN', ja: 'ja-JP', ko: 'ko-KR', pt: 'pt-PT', ru: 'ru-RU', it: 'it-IT', tr: 'tr-TR' };
    utterance.lang = langMap[language] || 'en-US';
    utterance.rate = 1;
    utterance.pitch = 1;

    utterance.onstart = () => {
      setIsPlaying(true);
    };
    utterance.onboundary = (e) => {
      if (e.name === 'word') {
        const charIdx = e.charIndex;
        const total = text.length || 1;
        const pct = (charIdx / total) * 100;
        setProgress(pct);
        const estDuration = text.length / 15;
        setCurrentTime((charIdx / total) * estDuration);
      }
    };
    utterance.onend = () => {
      setIsPlaying(false);
      setProgress(100);
      setCurrentTime(text.length / 15);
      setTimeout(() => {
        setProgress(0);
        setCurrentTime(0);
      }, 300);
      onEnded?.();
    };
    utterance.onerror = () => {
      setIsPlaying(false);
      setProgress(0);
      setCurrentTime(0);
    };

    window.speechSynthesis.speak(utterance);
  };

  const stopSpeech = () => {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (audioRef.current) {
      audioRef.current.pause();
      audioRef.current.currentTime = 0;
    }
    setIsPlaying(false);
    setProgress(0);
    setCurrentTime(0);
  };

  const togglePlay = () => {
    if (isPlaying) {
      stopSpeech();
    } else {
      if (text) {
        speakText();
      } else if (audioRef.current) {
        audioRef.current.play();
        setIsPlaying(true);
      }
    }
  };

  const handleTimeUpdate = () => {
    if (audioRef.current) {
      setCurrentTime(audioRef.current.currentTime);
      if (audioRef.current.duration) {
        setProgress((audioRef.current.currentTime / audioRef.current.duration) * 100);
      }
    }
  };

  const handleAudioEnded = () => {
    setIsPlaying(false);
    setProgress(0);
    setCurrentTime(0);
    onEnded?.();
  };

  const handleProgressClick = (e) => {
    if (!progressRef.current) return;
    const rect = progressRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = x / rect.width;
    setProgress(pct * 100);
    if (audioRef.current && !text) {
      audioRef.current.currentTime = pct * audioRef.current.duration;
    }
  };

  const formatTime = (s) => { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${m}:${sec.toString().padStart(2, '0')}`; };

  return (
    <div className={`bg-warmWhite border-2 border-sandDark rounded-2xl flex items-center gap-3 ${compact ? 'px-3.5 py-2.5' : 'px-5 py-4'}`}>
      <audio ref={audioRef} src={audioUrl} onTimeUpdate={handleTimeUpdate} onEnded={handleAudioEnded} />
      <button onClick={togglePlay} className={`rounded-full bg-teal hover:bg-tealDark text-white flex items-center justify-center flex-shrink-0 transition-colors ${compact ? 'w-9 h-9' : 'w-11 h-11'}`}>
        {isPlaying ? <Icons.Pause s={compact ? 16 : 20} /> : <Icons.Play s={compact ? 16 : 20} c="ml-0.5" />}
      </button>
      {!compact && <button onClick={stopSpeech} className="w-9 h-9 rounded-full bg-sandDark flex items-center justify-center flex-shrink-0 hover:bg-sand transition-colors"><Icons.Square s={14} /></button>}
      <div className="flex-1 min-w-0">
        <div ref={progressRef} onClick={handleProgressClick} className={`bg-sandDark rounded-full cursor-pointer relative overflow-hidden ${compact ? 'h-1' : 'h-1.5'}`}>
          <div className="h-full bg-gradient-to-r from-teal to-tealLight rounded-full transition-all duration-100" style={{ width: `${progress}%` }} />
        </div>
        {!compact && <div className="flex justify-between mt-1.5 text-xs text-charcoalLight"><span>{formatTime(currentTime)}</span><span>{formatTime(audioRef.current?.duration || (text ? text.length / 15 : 0))}</span></div>}
      </div>
      {!compact && (
        <div className="flex items-end gap-[3px] h-8">
          {Array.from({ length: 20 }).map((_, i) => (
            <div
              key={i}
              className={`w-[3px] rounded-sm transition-all duration-300 ${isPlaying ? 'bg-teal visualizer-bar' : 'bg-sandDark'}`}
              style={{
                height: isPlaying ? '100%' : '6px',
                animationDelay: `${i * 0.04}s`,
                animationDuration: `${0.4 + Math.sin(i) * 0.2}s`
              }}
            />
          ))}
        </div>
      )}
    </div>
  );
};

// ============================================
// TEXT TO SPEECH (WORKING with Web Speech API)
// ============================================
const TextToSpeech = ({ onSave, onToast }) => {
  const [text, setText] = useState('');
  const [language, setLanguage] = useState('en');
  const [voice, setVoice] = useState('');
  const [isGenerating, setIsGenerating] = useState(false);
  const [generatedAudio, setGeneratedAudio] = useState(null);
  const [isSpeaking, setIsSpeaking] = useState(false);
  const maxChars = 5000;
  const voices = VOICES[language] || [];

  useEffect(() => {
    if (voices.length > 0) {
      const exists = voices.some(v => v.id === voice);
      if (!exists) {
        setVoice(voices[0].id);
      }
    } else {
      setVoice('');
    }
  }, [language, voices]);

  // Restart speech synthesis immediately when language or voice options are changed
  useEffect(() => {
    if (isSpeaking && text.trim()) {
      speakText();
    }
  }, [language, voice]);

  const handleTextChange = (e) => { 
    const val = e.target.value; 
    if (val.length <= maxChars) setText(val); 
    else onToast('Character limit reached (5000 max)', 'warning'); 
  };

  // REAL TTS using Web Speech API
  const speakText = () => {
    if (!text.trim()) { onToast('Please enter some text first', 'error'); return; }
    if (!window.speechSynthesis) { onToast('Speech synthesis not supported in this browser', 'error'); return; }

    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);

    // Map language codes
    const langMap = { en: 'en-US', ur: 'ur-PK', ar: 'ar-SA', hi: 'hi-IN', es: 'es-ES', fr: 'fr-FR', de: 'de-DE', zh: 'zh-CN', ja: 'ja-JP', ko: 'ko-KR', pt: 'pt-PT', ru: 'ru-RU', it: 'it-IT', tr: 'tr-TR' };
    utterance.lang = langMap[language] || 'en-US';
    utterance.rate = 1;
    utterance.pitch = 1;

    // Try to set voice gender
    const systemVoices = window.speechSynthesis.getVoices();
    const selectedVoice = voices.find(v => v.id === voice);
    if (selectedVoice && systemVoices.length > 0) {
      const genderFilter = selectedVoice.gender.toLowerCase();
      const targetLangPrefix = utterance.lang.split('-')[0].toLowerCase();
      const langMatchingVoices = systemVoices.filter(v => v.lang.toLowerCase().startsWith(targetLangPrefix));

      if (langMatchingVoices.length > 0) {
        let matching = null;
        if (genderFilter === 'female') {
          matching = langMatchingVoices.find(v => isSystemVoiceFemale(v.name));
        } else if (genderFilter === 'male') {
          matching = langMatchingVoices.find(v => isSystemVoiceMale(v.name));
        }
        
        if (!matching) {
          matching = langMatchingVoices.find(v => v.lang.includes(utterance.lang)) || langMatchingVoices[0];
        }
        
        if (matching) utterance.voice = matching;
      }
    }

    utterance.onstart = () => setIsSpeaking(true);
    utterance.onend = () => { setIsSpeaking(false); onToast('Speech finished', 'info'); };
    utterance.onerror = (e) => { setIsSpeaking(false); console.error('Speech error:', e); };

    window.speechSynthesis.speak(utterance);
    setGeneratedAudio('speech-active');
    onToast('Speaking...', 'info');
  };

  const stopSpeech = () => {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    setIsSpeaking(false);
  };

  const generateAndSave = async () => {
    if (!text.trim()) { onToast('Please enter some text first', 'error'); return; }
    setIsGenerating(true);

    try {
      // Call backend API
      const selectedVoice = voices.find(v => v.id === voice);
      const response = await api.post('/api/tts/generate', {
        text,
        language,
        voice,
        voiceName: selectedVoice?.name || 'Default'
      });

      if (response.success) {
        onSave(response.recording);
        setGeneratedAudio('speech-active');
        onToast('Audio generated and saved!', 'success');

        // Also speak it
        speakText();
      } else {
        onToast(response.error || 'Generation failed', 'error');
      }
    } catch (err) {
      console.error(err);
      // Fallback: save locally
      const selectedVoice = voices.find(v => v.id === voice);
      const selectedLang = LANGUAGES.find(l => l.code === language);
      const recording = {
        id: Date.now(),
        title: text.slice(0, 50) + (text.length > 50 ? '...' : ''),
        text,
        date: new Date().toISOString(),
        feature: 'Text to Speech',
        language: selectedLang?.name || language,
        voice: selectedVoice?.name || 'Default',
        duration: `${Math.floor(text.length / 900)}:${Math.floor((text.length % 900) / 15).toString().padStart(2, '0')}`,
        audioUrl: null,
        thumbnail: 'wave',
      };
      onSave(recording);
      onToast('Saved locally (backend unavailable)', 'warning');
      speakText();
    }

    setIsGenerating(false);
  };

  const [showOCR, setShowOCR] = useState(false);

  const handleOCRScan = (scannedText) => {
    setText(prev => prev ? prev + ' ' + scannedText : scannedText);
  };

  return (
    <div className="animate-fadeIn max-w-3xl mx-auto">
      <div className="mb-6">
        <h2 className="text-2xl font-display font-bold text-charcoal mb-1">Text to Speech</h2>
        <p className="text-charcoalLight text-sm">Convert your text into natural-sounding speech</p>
      </div>
      <div className="bg-warmWhite border-2 border-sandDark rounded-2xl p-6 mb-6">
        <div className="mb-4">
          <label className="block text-[13px] font-semibold text-charcoal mb-1.5">Your Text</label>
          <textarea value={text} onChange={handleTextChange} placeholder="Enter your text here..." className="w-full h-48 p-4 border-2 border-sandDark rounded-xl text-sm resize-none outline-none focus:border-teal transition-colors bg-sand/30" />
          <div className="flex justify-between mt-2 text-xs">
            <span className={`font-medium ${text.length >= maxChars ? 'text-red-500' : 'text-charcoalLight'}`}>{text.length} / {maxChars} characters</span>
            {text.length >= maxChars && <span className="text-red-500 font-medium">Limit reached</span>}
          </div>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <SearchableDropdown options={LANGUAGES} value={language} onChange={setLanguage} placeholder="Select language" label="Language" icon={Icons.Globe} />
          <SearchableDropdown options={voices.map(v => ({ ...v, code: v.id }))} value={voice} onChange={setVoice} placeholder="Select voice" label="Voice" icon={Icons.Volume2} />
        </div>
        <div className="flex flex-wrap gap-3">
          <button onClick={generateAndSave} disabled={isGenerating} className="flex items-center gap-2 px-6 py-3 bg-teal hover:bg-tealDark text-white rounded-xl font-medium text-sm transition-colors disabled:opacity-50">
            {isGenerating ? <><Icons.Loader s={18} /> Generating...</> : <><Icons.Sparkles s={18} /> Generate & Save</>}
          </button>
          <button onClick={() => setShowOCR(true)} className="flex items-center gap-2 px-6 py-3 bg-lavender hover:bg-lavenderLight text-charcoal rounded-xl font-medium text-sm transition-colors"><Icons.Camera s={18} /> Scan Text</button>
          <button onClick={isSpeaking ? stopSpeech : speakText} className={`flex items-center gap-2 px-6 py-3 rounded-xl font-medium text-sm transition-colors ${isSpeaking ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-accent hover:bg-accent/90 text-white'}`}>
            {isSpeaking ? <><Icons.Square s={18} /> Stop</> : <><Icons.Play s={18} /> Preview</>}
          </button>
        </div>
      </div>
      {generatedAudio && (
        <div className="bg-warmWhite border-2 border-sandDark rounded-2xl p-6 animate-fadeIn">
          <h3 className="text-sm font-semibold text-charcoal mb-3">Preview</h3>
          <AudioPlayer text={text} language={language} />
          <div className="mt-4 flex gap-3">
            <button onClick={() => { 
              const blob = new Blob([text], { type: 'text/plain' }); 
              const url = URL.createObjectURL(blob); 
              const a = document.createElement('a'); 
              a.href = url; 
              a.download = 'vento-tts.txt'; 
              a.click(); 
            }} className="flex items-center gap-2 px-4 py-2.5 border-2 border-teal text-teal hover:bg-teal hover:text-white rounded-xl text-sm font-medium transition-colors">
              <Icons.Download s={16} /> Download Text
            </button>
          </div>
        </div>
      )}
      {showOCR && <CameraOCR onScan={handleOCRScan} onClose={() => setShowOCR(false)} onToast={onToast} />}
    </div>
  );
};

// ============================================
// CAMERA OCR
// ============================================
const CameraOCR = ({ onScan, onClose, onToast }) => {
  const videoRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const [isScanning, setIsScanning] = React.useState(false);

  React.useEffect(() => {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(s => {
        streamRef.current = s;
        if (videoRef.current) videoRef.current.srcObject = s;
      })
      .catch(err => {
        onToast('Camera access denied or unavailable', 'error');
        onClose();
      });
    return () => {
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    };
  }, []);

  const handleScan = async () => {
    if (!videoRef.current || !canvasRef.current) return;
    setIsScanning(true);
    const video = videoRef.current;
    const canvas = canvasRef.current;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    try {
      const result = await window.Tesseract.recognize(canvas.toDataURL('image/png'), 'eng');
      if (result.data.text.trim()) {
        onScan(result.data.text);
        onClose();
      } else {
        onToast('No text found. Try again.', 'warning');
      }
    } catch (err) {
      onToast('Error scanning text', 'error');
    }
    setIsScanning(false);
  };

  return (
    <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4">
      <div className="bg-warmWhite rounded-2xl p-6 max-w-lg w-full shadow-2xl">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-xl font-display font-bold text-charcoal">Scan Text from Camera</h3>
          <button onClick={onClose} className="p-2 hover:bg-sand rounded-lg"><Icons.X s={20} /></button>
        </div>
        <p className="text-xs text-charcoalLight mb-3">Point your camera at text and tap Capture.</p>
        <div className="relative rounded-xl overflow-hidden bg-black aspect-video mb-4">
          <video ref={videoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
          <canvas ref={canvasRef} className="hidden" />
          {isScanning && (
            <div className="absolute inset-0 bg-teal/20 flex flex-col items-center justify-center gap-2">
              <Icons.Loader s={32} c="text-white" />
              <p className="text-white font-medium text-sm">Scanning for text...</p>
            </div>
          )}
        </div>
        <button onClick={handleScan} disabled={isScanning} className="w-full py-3 bg-teal hover:bg-tealDark disabled:opacity-50 text-white rounded-xl font-medium transition-colors flex items-center justify-center gap-2">
          <Icons.Camera s={18} /> {isScanning ? 'Scanning...' : 'Capture & Scan'}
        </button>
      </div>
    </div>
  );
};

// ============================================
// VOICE ASSISTANT (like Jarvis)
// ============================================
const VoiceAssistant = ({ onToast }) => {
  const [isListening, setIsListening] = useState(false);
  const [transcript, setTranscript] = useState('');
  const [answer, setAnswer] = useState('');
  const [isSpeaking, setIsSpeaking] = useState(false);
  const recognitionRef = useRef(null);

  // Initialize speech recognition
  useEffect(() => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      onToast('Speech Recognition not supported in this browser!', 'error');
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
      setIsListening(true);
      setTranscript('');
    };

    recognition.onresult = (event) => {
      let finalTranscript = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          finalTranscript += event.results[i][0].transcript;
        }
      }
      setTranscript(finalTranscript);
    };

    recognition.onend = () => {
      setIsListening(false);
    };

    recognition.onerror = (event) => {
      console.error('Speech recognition error:', event.error);
      onToast(`Speech recognition error: ${event.error}`, 'error');
      setIsListening(false);
    };

    recognitionRef.current = recognition;
  }, [onToast]);

  // Handle question answering
  const getAnswer = (question) => {
    const q = question.toLowerCase().trim();
    
    if (q.includes('hello') || q.includes('hi') || q.includes('hey')) {
      return 'Hello! How can I help you today?';
    }
    if (q.includes('how are you')) {
      return 'I am doing great, thank you for asking! How about you?';
    }
    if (q.includes('what is your name') || q.includes('who are you')) {
      return 'My name is Vento Assistant, your personal voice assistant!';
    }
    if (q.includes('time')) {
      const now = new Date();
      return `The current time is ${now.toLocaleTimeString()}`;
    }
    if (q.includes('date')) {
      const now = new Date();
      return `Today is ${now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;
    }
    if (q.includes('vento') || q.includes('what can you do')) {
      return 'I can help you with text to speech, scanning text, and answer basic questions!';
    }

    // Default answer
    return `I heard you say: "${question}". I'm still learning, but I'll try my best to help!`;
  };

  const speakAnswer = (answerText) => {
    if (!window.speechSynthesis) return;
    setAnswer(answerText); // Show the answer text
    setIsSpeaking(true);
    const utterance = new SpeechSynthesisUtterance(answerText);
    utterance.lang = 'en-US';
    utterance.rate = 1;
    utterance.pitch = 1;

    // Try to use a male voice (like Jarvis)
    const voices = window.speechSynthesis.getVoices();
    const maleVoice = voices.find(v => isSystemVoiceMale(v.name));
    if (maleVoice) utterance.voice = maleVoice;

    utterance.onend = () => setIsSpeaking(false);
    utterance.onerror = () => setIsSpeaking(false);

    window.speechSynthesis.speak(utterance);
  };

  const toggleListening = () => {
    if (isListening) {
      recognitionRef.current?.stop();
      return;
    }

    if (isSpeaking) {
      window.speechSynthesis.cancel();
      setIsSpeaking(false);
      return;
    }

    if (transcript) {
      // If we have a transcript, answer it
      const answer = getAnswer(transcript);
      speakAnswer(answer);
    } else {
      // Start listening
      recognitionRef.current?.start();
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && transcript) {
      const answer = getAnswer(transcript);
      speakAnswer(answer);
    }
  };

  return (
    <div className="animate-fadeIn max-w-3xl mx-auto">
      <div className="mb-6">
        <h2 className="text-2xl font-display font-bold text-charcoal mb-1">Voice Assistant</h2>
        <p className="text-charcoalLight text-sm">Ask me anything, I'll respond only with voice!</p>
      </div>

      <div className="bg-warmWhite border-2 border-sandDark rounded-2xl p-8 mb-6 text-center">
        <div className="mb-6">
          <button 
            onClick={toggleListening}
            className={`w-32 h-32 rounded-full flex items-center justify-center mx-auto transition-all duration-300 ${isListening ? 'bg-red-500 animate-pulse scale-110' : isSpeaking ? 'bg-accent' : 'bg-teal hover:bg-tealDark'} text-white shadow-lg`}
          >
            <Icons.Mic s={48} />
          </button>
        </div>

        <div className="mb-4">
          <p className="text-sm font-semibold text-charcoal mb-2">
            {isListening ? 'Listening...' : isSpeaking ? 'Speaking...' : 'Tap to start listening!'}
          </p>
          {isListening && (
            <div className="flex items-center justify-center gap-1 h-8">
              {Array.from({length:12}).map((_,i) => (
                <div key={i} className="w-2 rounded-full bg-teal animate-wave" style={{animationDelay: `${i*0.05}s`}}></div>
              ))}
            </div>
          )}
        </div>

        <div className="p-4 bg-sand/50 border border-sandDark rounded-xl mb-4">
          <label className="block text-xs font-semibold text-charcoalLight uppercase tracking-wide mb-2">
            Your Question
          </label>
          <textarea
            value={transcript}
            onChange={(e) => setTranscript(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder="Your question will appear here..."
            className="w-full p-3 border-0 rounded-lg text-sm bg-transparent outline-none resize-none"
            rows={3}
          />
        </div>

        {answer && (
          <div className="p-4 bg-teal/10 border border-teal/30 rounded-xl mb-4">
            <label className="block text-xs font-semibold text-teal uppercase tracking-wide mb-2">
              Jarvis's Answer
            </label>
            <p className="text-sm text-charcoal leading-relaxed">{answer}</p>
          </div>
        )}

        <div className="flex justify-center gap-3">
          <button 
            onClick={() => {
              if (transcript) {
                const ans = getAnswer(transcript);
                speakAnswer(ans);
              }
            }}
            disabled={!transcript || isSpeaking}
            className="flex items-center gap-2 px-6 py-3 bg-teal hover:bg-tealDark text-white rounded-xl font-medium text-sm transition-colors disabled:opacity-50"
          >
            <Icons.Play s={16} /> Get Answer
          </button>
          <button 
            onClick={() => {
              setTranscript('');
              setAnswer('');
            }}
            disabled={!transcript && !answer}
            className="flex items-center gap-2 px-6 py-3 border-2 border-sandDark text-charcoal hover:bg-sand rounded-xl font-medium text-sm transition-colors disabled:opacity-50"
          >
            <Icons.X s={16} /> Clear
          </button>
        </div>
      </div>

      <div className="bg-warmWhite/80 border-2 border-sandDark/50 rounded-xl p-4">
        <h3 className="text-sm font-semibold text-charcoal mb-3">Things you can ask:</h3>
        <ul className="text-sm text-charcoalLight space-y-1">
          <li>• Hello, how are you?</li>
          <li>• What's your name?</li>
          <li>• What time is it?</li>
          <li>• What's today's date?</li>
          <li>• What can you do?</li>
        </ul>
      </div>
    </div>
  );
};

const MyRecordings = ({ recordings, onDelete, onRename, onToast }) => {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState('');
  const [speakingId, setSpeakingId] = useState(null);

  const filtered = recordings.filter(r => {
    const matchesSearch = r.title.toLowerCase().includes(search.toLowerCase()) || r.language.toLowerCase().includes(search.toLowerCase());
    const matchesFilter = filter === 'all' || r.feature === filter;
    return matchesSearch && matchesFilter;
  });

  const formatDate = (iso) => new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  const startRename = (r) => { setEditingId(r.id); setEditName(r.title); };

  const confirmRename = async () => {
    if (!editName.trim()) return;
    try {
      await api.put(`/api/recordings/${editingId}`, { title: editName.trim() });
    } catch (e) { /* fallback */ }
    onRename(editingId, editName.trim());
    setEditingId(null);
    onToast('Recording renamed', 'success');
  };

  const handleDelete = async (id) => {
    try { await api.del(`/api/recordings/${id}`); } catch (e) { /* fallback */ }
    onDelete(id);
    onToast('Recording deleted', 'info');
  };

  const playRecording = (r) => {
    if (!r.text || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(r.text.slice(0, 500));
    const langMap = { en: 'en-US', ur: 'ur-PK', ar: 'ar-SA', hi: 'hi-IN', es: 'es-ES', fr: 'fr-FR', de: 'de-DE', zh: 'zh-CN', ja: 'ja-JP', ko: 'ko-KR', pt: 'pt-PT', ru: 'ru-RU', it: 'it-IT', tr: 'tr-TR' };
    utterance.lang = langMap[r.language?.split(' ')[0].toLowerCase()] || 'en-US';
    utterance.onstart = () => setSpeakingId(r.id);
    utterance.onend = () => setSpeakingId(null);
    window.speechSynthesis.speak(utterance);
  };

  const getIcon = (feature) => { if (feature === 'Text to Speech') return <Icons.Type s={20} />; if (feature === 'Accent Changer') return <Icons.ArrowRightLeft s={20} />; return <Icons.Music s={20} />; };

  return (
    <div className="animate-fadeIn max-w-4xl mx-auto">
      <div className="mb-6">
        <h2 className="text-2xl font-display font-bold text-charcoal mb-1">My Recordings</h2>
        <p className="text-charcoalLight text-sm">{recordings.length} {recordings.length === 1 ? 'recording' : 'recordings'} saved</p>
      </div>
      <div className="flex flex-col sm:flex-row gap-3 mb-6">
        <div className="relative flex-1">
          <Icons.Search s={18} c="absolute left-3.5 top-1/2 -translate-y-1/2 text-charcoalLight" />
          <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search recordings..." className="w-full pl-10 pr-4 py-3 bg-warmWhite border-2 border-sandDark rounded-xl text-sm outline-none focus:border-teal" />
        </div>
        <select value={filter} onChange={(e) => setFilter(e.target.value)} className="px-4 py-3 bg-warmWhite border-2 border-sandDark rounded-xl text-sm outline-none focus:border-teal cursor-pointer">
          <option value="all">All Features</option>
          <option value="Text to Speech">Text to Speech</option>
          
        </select>
      </div>
      {filtered.length === 0 ? (
        <div className="bg-warmWhite border-2 border-sandDark rounded-2xl p-12 text-center">
          <Icons.Music s={48} c="text-sandDark mx-auto mb-4" />
          <h3 className="text-lg font-semibold text-charcoal mb-1">No recordings yet</h3>
          <p className="text-sm text-charcoalLight">Generate audio from any feature and it will appear here automatically</p>
        </div>
      ) : (
        <div className="space-y-3">
          {filtered.map((recording) => (
            <div key={recording.id} className="bg-warmWhite border-2 border-sandDark rounded-2xl p-4 flex items-center gap-4 hover:border-lavender transition-colors">
              <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-teal/20 to-lavender/20 flex items-center justify-center flex-shrink-0 text-teal">
                {getIcon(recording.feature)}
              </div>
              <div className="flex-1 min-w-0">
                {editingId === recording.id ? (
                  <div className="flex items-center gap-2">
                    <input type="text" value={editName} onChange={(e) => setEditName(e.target.value)} className="flex-1 px-3 py-1.5 border border-sandDark rounded-lg text-sm outline-none focus:border-teal" autoFocus onKeyDown={(e) => e.key === 'Enter' && confirmRename()} />
                    <button onClick={confirmRename} className="p-1.5 bg-teal text-white rounded-lg"><Icons.Check s={14} /></button>
                    <button onClick={() => setEditingId(null)} className="p-1.5 bg-sandDark rounded-lg"><Icons.X s={14} /></button>
                  </div>
                ) : (
                  <h3 className="text-sm font-semibold text-charcoal truncate">{recording.title}</h3>
                )}
                <div className="flex items-center gap-2 mt-1 text-xs text-charcoalLight">
                  <span>{recording.feature}</span>
                  <span className="w-1 h-1 rounded-full bg-sandDark" />
                  <span>{recording.language}</span>
                  <span className="w-1 h-1 rounded-full bg-sandDark" />
                  <span>{recording.duration}</span>
                  <span className="w-1 h-1 rounded-full bg-sandDark" />
                  <span>{formatDate(recording.date)}</span>
                </div>
              </div>
              <div className="flex items-center gap-1">
                <button onClick={() => playRecording(recording)} className={`p-2 rounded-lg transition-colors ${speakingId === recording.id ? 'bg-red-500 text-white' : 'hover:bg-sand'}`} title="Play">
                  {speakingId === recording.id ? <Icons.Square s={16} /> : <Icons.Play s={16} />}
                </button>
                <button onClick={() => { 
                  const blob = new Blob([recording.text || ''], { type: 'text/plain' }); 
                  const url = URL.createObjectURL(blob); 
                  const a = document.createElement('a'); 
                  a.href = url; 
                  a.download = `${recording.title}.txt`; 
                  a.click(); 
                }} className="p-2 hover:bg-sand rounded-lg transition-colors" title="Download"><Icons.Download s={16} /></button>
                <button onClick={() => startRename(recording)} className="p-2 hover:bg-sand rounded-lg transition-colors" title="Rename"><Icons.Edit3 s={16} /></button>
                <button onClick={() => { navigator.clipboard.writeText(recording.text || ''); onToast('Text copied to clipboard', 'success'); }} className="p-2 hover:bg-sand rounded-lg transition-colors" title="Share"><Icons.Share2 s={16} /></button>
                <button onClick={() => handleDelete(recording.id)} className="p-2 hover:bg-red-50 text-red-500 rounded-lg transition-colors" title="Delete"><Icons.Trash2 s={16} /></button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

        {/* Top bar */}
        <header className="h-16 bg-warmWhite/80 backdrop-blur-md border-b-2 border-sandDark flex items-center justify-between px-4 lg:px-6 flex-shrink-0">
          <div className="flex items-center gap-3">
            <button onClick={() => setMobileSidebarOpen(true)} className="lg:hidden p-2 hover:bg-sand rounded-lg transition-colors">
              <Icons.Menu s={20} />
            </button>
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-teal to-tealLight flex items-center justify-center">
                <Icons.Waveform s={16} c="text-white" />
              </div>
              <span className="font-display font-bold text-charcoal text-lg">Vento</span>
            </div>
          </div>
          <div className="flex items-center gap-3">
            {!backendOnline && (
              <span className="text-xs text-red-500 bg-red-50 px-3 py-1 rounded-full">Offline Mode</span>
            )}
            <button className="w-9 h-9 rounded-full bg-sand hover:bg-sandDark flex items-center justify-center transition-colors">
              <Icons.User s={18} />
            </button>
          </div>
        </header>

        {/* Content area */}
        <div className="flex-1 overflow-y-auto p-4 lg:p-8">
          {renderContent()}
        </div>
      </main>

      {/* Toast */}
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
